    const raritaMap = {
        "C": { nome: "Comune", icona: "○", stelle: 1 },
        "R": { nome: "Rara", icona: "◆", stelle: 2 },
        "RR": { nome: "Grande rarità", icona: "★", stelle: 3 }
    };

    function getStelle(rarita) {
        const totale = raritaMap[rarita].stelle;
        let stelleHtml = '';
        for (let i = 1; i <= 3; i++) {
            stelleHtml += i <= totale ? '<span class="stella piena">★</span>' : '<span class="stella vuota">☆</span>';
        }
        return stelleHtml;
    }

    function formatValue(value) {
        if (!value || value === "" || value === "manca" || value === "MANCA" || value === "-" || value === "?") {
            return `<span class="riferimento-mancante">—</span>`;
        }
        return value;
    }

    // MODIFICATO: ora punta direttamente a CNT-{cnt}/
    function getFotoPath(cnt, tipo) {
        return `CNT-${cnt}/${tipo}.jpg.png`;
    }

    function apriFoto(src) {
        document.getElementById('modal-img').src = src;
        document.getElementById('modal').style.display = 'flex';
    }

    function chiudiFoto() {
        document.getElementById('modal').style.display = 'none';
    }

    function scrollToCnt(cnt) {
        const elemento = document.getElementById(`cnt-${cnt}`);
        if (elemento) {
            elemento.scrollIntoView({ behavior: 'smooth' });
        }
    }

    function generaSchemiQuadri(schemiArray, titolo) {
        let quadratiHtml = '';
        for (let i = 0; i < schemiArray.length; i++) {
            const s = schemiArray[i];
            
            let pulsantiSchemaHtml = '';
            for (let j = 0; j < s.pulsanti.length; j++) {
                const p = s.pulsanti[j];
                pulsantiSchemaHtml += `<button class="btn-cnt" onclick="event.stopPropagation(); scrollToCnt('${p.cnt}')">CNT ${p.cnt}</button>`;
            }
            
            quadratiHtml += `
                <div class="casella-schema" onclick="apriFoto('${s.immagine}')">
                    <div class="etichetta-schema">${s.titolo}</div>
                    <div class="contenitore-foto-schema">
                        <img src="${s.immagine}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%23fcfbf9%22/%3E%3Ctext x=%22100%22 y=%22100%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23dcd3be%22 font-size=%2212%22%3E${s.titolo}%3C/text%3E%3C/svg%3E'">
                    </div>
                    <div class="pulsanti-schema">
                        ${pulsantiSchemaHtml}
                    </div>
                </div>
            `;
        }
        
        return `
            <div class="container-schemi">
                <div class="titolo-schemi">📜 ${titolo}</div>
                <div class="griglia-schemi">
                    ${quadratiHtml}
                </div>
            </div>
        `;
    }

    function aggiungiMonetaAlContainer(moneta, container, indiceContainer) {
        if (!moneta.rarita) moneta.rarita = "C";
        const raritaInfo = raritaMap[moneta.rarita];
        
        const monetaDiv = document.createElement('div');
        monetaDiv.className = 'container';
        monetaDiv.id = `cnt-${moneta.cnt}`;
        
        const annoDisplay = moneta.anno ? `<span class="badge-anno">${moneta.anno}</span>` : '';
        const noteDisplay = moneta.note ? `<div class="nota">📝 ${moneta.note}</div>` : '';
        
        let legendaHtml = moneta.legenda_dritto && moneta.legenda_dritto !== "" ? `
            <h3>Legenda</h3>
            <div class="legenda-box">
                <strong>D/</strong> ${moneta.legenda_dritto.replace('D/ ', '')}<br>
                <strong>R/</strong> ${moneta.legenda_rovescio.replace('R/ ', '')}
            </div>
        ` : `
            <h3>Legenda</h3>
            <div class="legenda-box">
                <strong>D/</strong> · PETRVS · S · IOHANNES · B ·<br>
                <strong>R/</strong> · FLORENTIA · · · ·
            </div>
        `;
        
        const raritaHtml = `
            <div class="rarita-box rarita-${moneta.rarita}">
                <div class="rarita-sx">
                    <span class="rarita-icona">${raritaInfo.icona}</span>
                    <span class="rarita-label">${raritaInfo.nome}</span>
                </div>
                <div class="rarita-stelle">${getStelle(moneta.rarita)}</div>
            </div>
        `;
        
        let conioHtml = '';
        if (moneta.incisore_dritto && moneta.incisore_rovescio) {
            conioHtml = `
                <div class="bottoni-conio">
                    <div class="conio-wrapper">
                        <button class="btn-conio" onclick="window.open('incisori-pietroleopoldo.html?conio=dritto', '_blank')">🔨 Conio Dritto</button>
                        <div class="incisore-nome">${moneta.incisore_dritto}</div>
                    </div>
                    <div class="conio-wrapper">
                        <button class="btn-conio" onclick="window.open('incisori-pietroleopoldo.html?conio=rovescio', '_blank')">🔨 Conio Rovescio</button>
                        <div class="incisore-nome">${moneta.incisore_rovescio}</div>
                    </div>
                </div>
            `;
        } else {
            conioHtml = `
                <div class="bottoni-conio">
                    <div class="conio-wrapper"><button class="btn-conio" onclick="window.open('incisori-pietroleopoldo.html?conio=dritto', '_blank')">🔨 Conio Dritto</button></div>
                    <div class="conio-wrapper"><button class="btn-conio" onclick="window.open('incisori-pietroleopoldo.html?conio=rovescio', '_blank')">🔨 Conio Rovescio</button></div>
                </div>
            `;
        }
        
        monetaDiv.innerHTML = `
            <div class="layout-griglia">
                <div class="colonna-testi">
                    <div class="numero-moneta">CNT ${moneta.cnt} ${annoDisplay}</div>
                    <a href="FIRENZE.html" class="link-indietro">← Torna all'Indice</a>
                    <div class="contenuto-flessibile">
                        <h3>Riferimenti</h3>
                        <p><strong>PUCCI:</strong> ${formatValue(moneta.pucci)}</p>
                        <p><strong>Pellegrini:</strong> ${formatValue(moneta.pellegrini)}</p>
                        <p><strong>CIABATTI:</strong> ${formatValue(moneta.ciabatti)}</p>
                        <h3>Descrizione</h3>
                        <p style="font-size: 0.75em; line-height: 1.3;">${moneta.descrizione}</p>
                        ${noteDisplay}
                        ${legendaHtml}
                        ${raritaHtml}
                    </div>
                </div>

                <div class="griglia-foto">
                    <div class="foto-box" onclick="apriFoto('${getFotoPath(moneta.cnt, 'dritto')}')">
                        <img src="${getFotoPath(moneta.cnt, 'dritto')}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23fcfbf9%22/%3E%3Ctext x=%2250%22 y=%2250%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23dcd3be%22 font-size=%2210%22%3ECNT ${moneta.cnt}%3C/text%3E%3C/svg%3E'">
                    </div>
                    <div class="foto-box" onclick="apriFoto('${getFotoPath(moneta.cnt, 'rovescio')}')">
                        <img src="${getFotoPath(moneta.cnt, 'rovescio')}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23fcfbf9%22/%3E%3Ctext x=%2250%22 y=%2250%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23dcd3be%22 font-size=%2210%22%3ECNT ${moneta.cnt}%3C/text%3E%3C/svg%3E'">
                    </div>
                    <div class="foto-box" onclick="apriFoto('${getFotoPath(moneta.cnt, 'bordo')}')">
                        <img src="${getFotoPath(moneta.cnt, 'bordo')}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23fcfbf9%22/%3E%3Ctext x=%2250%22 y=%2250%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23dcd3be%22 font-size=%2210%22%3ECNT ${moneta.cnt}%3C/text%3E%3C/svg%3E'">
                    </div>
                    <div class="foto-box" onclick="apriFoto('${getFotoPath(moneta.cnt, 'segni')}')">
                        <img src="${getFotoPath(moneta.cnt, 'segni')}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23fcfbf9%22/%3E%3Ctext x=%2250%22 y=%2250%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23dcd3be%22 font-size=%2210%22%3ECNT ${moneta.cnt}%3C/text%3E%3C/svg%3E'">
                    </div>
                </div>

                <div class="terza-colonna">
                    ${conioHtml}
                    <div class="foto-grande-wrapper" onclick="apriFoto('${getFotoPath(moneta.cnt, 'veduta-generale')}')">
                        <img class="foto-grande" src="${getFotoPath(moneta.cnt, 'veduta-generale')}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 300%22%3E%3Crect width=%22400%22 height=%22300%22 fill=%22%23fcfbf9%22/%3E%3Ctext x=%22200%22 y=%22140%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23dcd3be%22 font-size=%2216%22%3ECNT ${moneta.cnt}%3C/text%3E%3C/svg%3E'">
                    </div>
                    <div class="bottoni-container">
                        <button class="btn-documenti" onclick="window.open('documenti-CNT-${moneta.cnt}.html', '_blank')">📚 Documenti</button>
                        <button class="btn-tecnico" onclick="window.open('tecnico-CNT-${moneta.cnt}.html', '_blank')">🔬 Tecnica</button>
                    </div>
                </div>
            </div>
        `;
        
        container.appendChild(monetaDiv);
        
        const span = document.createElement('span');
        span.className = 'indice-item';
        span.textContent = moneta.cnt;
        span.onclick = () => document.getElementById(`cnt-${moneta.cnt}`).scrollIntoView({ behavior: 'smooth' });
        indiceContainer.appendChild(span);
    }

    function generaCatalogo() {
        const container = document.getElementById('catalogo-container');
        const indiceContainer = document.getElementById('indice-links');
        
        const schemi1765Html = generaSchemiQuadri(schemiQuadri1765, "Schemi Francesconi 1765");
        const schemi1765Div = document.createElement('div');
        schemi1765Div.innerHTML = schemi1765Html;
        container.appendChild(schemi1765Div);
        
        const monete1765 = monete.filter(m => m.anno === 1765);
        monete1765.forEach(moneta => {
            aggiungiMonetaAlContainer(moneta, container, indiceContainer);
        });
        
        const schemi1766DrittiHtml = generaSchemiQuadri(schemiQuadri1766_dritti, "Schemi Francesconi 1766 - Dritti");
        const schemi1766DrittiDiv = document.createElement('div');
        schemi1766DrittiDiv.innerHTML = schemi1766DrittiHtml;
        container.appendChild(schemi1766DrittiDiv);
        
        const schemi1766RovesciHtml = generaSchemiQuadri(schemiQuadri1766_rovesci, "Schemi Francesconi 1766 - Rovesci");
        const schemi1766RovesciDiv = document.createElement('div');
        schemi1766RovesciDiv.innerHTML = schemi1766RovesciHtml;
        container.appendChild(schemi1766RovesciDiv);
        
        const monete1766Francesconi = monete.filter(m => m.anno === 1766 && parseInt(m.cnt) < 25);
        monete1766Francesconi.forEach(moneta => {
            aggiungiMonetaAlContainer(moneta, container, indiceContainer);
        });
        
        const schemiRusponiHtml = generaSchemiQuadri(schemiQuadriRusponi, "Schemi Rusponi 1766");
        const schemiRusponiDiv = document.createElement('div');
        schemiRusponiDiv.innerHTML = schemiRusponiHtml;
        container.appendChild(schemiRusponiDiv);
        
        const moneteRusponi = monete.filter(m => parseInt(m.cnt) >= 25);
        moneteRusponi.forEach(moneta => {
            aggiungiMonetaAlContainer(moneta, container, indiceContainer);
        });
    }

    document.addEventListener('DOMContentLoaded', generaCatalogo);
</script>
